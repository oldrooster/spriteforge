services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app/app
      - uploads:/app/uploads
      - output:/app/output
      - library:/app/library
      - ./vertex-secret.json:/app/vertex-secret.json:ro
    environment:
      - FLASK_DEBUG=1
      - MAX_UPLOAD_SIZE=500
      # Vertex AI configuration (required)
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex-secret.json

volumes:
  uploads:
  output:
  library:
